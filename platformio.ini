; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-core2

[env:m5stack-core2]
platform = espressif32@^7.0.1
board = m5stack-core2
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
	-std=gnu++14
#	-DUSE_CA_CERT_BUNDLE
build_unflags =
	-std=gnu++11
lib_deps =
	m5stack/M5Unified@^0.2.18
	earlephilhower/ESP8266Audio@^1.9.9
	meganetaaan/M5Stack-Avatar@^0.10.0
	bblanchon/ArduinoJson@^7.4.3
	crankyoldgit/IRremoteESP8266@^2.8.6
	ESPmDNS
	https://github.com/yh1224/ESP32WebServer#fix-empty-request
board_build.embed_files =
	data/cert/gts_root_r1.pem
	data/cert/gts_root_r4.pem
	data/cert/gsrsaovsslca2018.pem
	data/cert/x509_crt_bundle.bin
